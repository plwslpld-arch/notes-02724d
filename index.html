<title>需要访问密码</title>
<style>
:root{--bg:#fbfaf8;--fg:#1c1a17;--mut:#6b6560;--line:#e6e1da;--card:#fff;--ac:#b4530a;--acs:#fdf3e9}
@media(prefers-color-scheme:dark){:root{--bg:#131211;--fg:#eae6e0;--mut:#9b948c;--line:#2b2926;--card:#1a1917;--ac:#e08a3c;--acs:#241a10}}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--fg);
font:16px/1.8 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;padding:24px}
.box{width:100%;max-width:380px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:34px 32px}
.k{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ac);margin-bottom:14px}
h1{font-size:20px;margin:0 0 8px;font-weight:700;line-height:1.5}
p{margin:0 0 22px;color:var(--mut);font-size:14px}
input{width:100%;padding:12px 14px;font-size:15px;border:1px solid var(--line);border-radius:10px;
background:var(--bg);color:var(--fg);outline:none;font-family:inherit}
input:focus{border-color:var(--ac)}
button{width:100%;margin-top:12px;padding:12px;font-size:15px;font-weight:600;border:none;border-radius:10px;
background:var(--ac);color:#fff;cursor:pointer;font-family:inherit}
button:disabled{opacity:.55;cursor:default}
.err{color:#c0392b;font-size:13.5px;margin-top:12px;min-height:20px}
@media(prefers-color-scheme:dark){.err{color:#ff8a75}}
</style></head><body>
